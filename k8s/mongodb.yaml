---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: instant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: root
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
                - --username
                - root
                - --password
                - root
                - --authenticationDatabase
                - admin
                - --quiet
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: instant
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
