# One-shot Job: creates the instant-shared bucket in MinIO after it starts.
# Idempotent — mc mb --ignore-existing is safe to re-run.
# Apply after minio.yaml: kubectl apply -f data/minio-bucket-init.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: instant-data
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-minio
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until wget -q -O /dev/null http://minio.instant-data.svc.cluster.local:9000/minio/health/ready; do
            echo "Waiting for MinIO..."; sleep 3
          done
          echo "MinIO ready."
      containers:
      - name: create-bucket
        image: minio/mc:RELEASE.2024-10-02T08-27-28Z
        command:
        - sh
        - -c
        - |
          mc alias set myminio \
            http://minio.instant-data.svc.cluster.local:9000 \
            "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" && \
          mc mb --ignore-existing myminio/instant-shared && \
          echo "Bucket instant-shared is ready."
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-secrets
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-secrets
              key: MINIO_ROOT_PASSWORD
