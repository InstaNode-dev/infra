apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: instant-data
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        args:
        - "-js"             # enable JetStream
        - "-m"
        - "8222"            # enable monitoring port
        ports:
        - name: client
          containerPort: 4222
        - name: monitoring
          containerPort: 8222
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: instant-data
  labels:
    app: nats
spec:
  selector:
    app: nats
  ports:
  - name: client
    port: 4222
    targetPort: 4222
  - name: monitoring
    port: 8222
    targetPort: 8222
---
# NodePort for external access from test machine
apiVersion: v1
kind: Service
metadata:
  name: nats-external
  namespace: instant-data
  labels:
    app: nats
spec:
  type: NodePort
  selector:
    app: nats
  ports:
  - name: client
    port: 4222
    targetPort: 4222
    nodePort: 30422
  - name: monitoring
    port: 8222
    targetPort: 8222
    nodePort: 30822
