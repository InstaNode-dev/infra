---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: instant-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: instant-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: root
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
                - --username
                - root
                - --password
                - root
                - --authenticationDatabase
                - admin
                - --quiet
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: instant-data
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# Secret consumed by provisioner deployment as MONGO_ADMIN_URI (added 2026-05-21
# for OSS prep — was previously inlined in provisioner/deployment.yaml).
# Operators MUST replace placeholders. The URI format is:
#   mongodb://<user>:<password>@mongodb.instant-data.svc.cluster.local:27017
# where <user>/<password> match MONGO_INITDB_ROOT_USERNAME/PASSWORD set on
# the mongodb StatefulSet (see the env vars above in this same file once you
# template them).
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-admin
  namespace: instant-data
type: Opaque
stringData:
  MONGO_ADMIN_URI: "CHANGE_ME"

