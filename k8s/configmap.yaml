apiVersion: v1
kind: ConfigMap
metadata:
  name: instant-config
  namespace: instant
data:
  PORT: "8080"
  # OpenTelemetry OTLP gRPC endpoint. Accepts either a bare `host:port` or
  # a full `https://host:port` / `http://host:port` URL — the InitTracer
  # helper strips the scheme and uses it to auto-select TLS vs plaintext.
  # Empty = tracing disabled (noop). In prod each Deployment overrides this
  # via its own `env:` entry to "https://otlp.nr-data.net:4317" (US) or
  # "https://otlp.eu01.nr-data.net:4317" (EU). NR ingest also requires
  # NEW_RELIC_LICENSE_KEY to be set in instant-secrets / instant-infra-
  # secrets; without it InitTracer logs telemetry.nr_license_missing WARN
  # and exports will be rejected by NR.
  #
  # 2026-05-20 P0-2: prior tracer.go used WithInsecure() against the TLS
  # endpoint with no api-key header — every export failed silently and
  # trace_id was empty on every log line. The TLS-by-scheme + api-key
  # header pair in tracer.go is the fix; the configmap behaviour did NOT
  # change.
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_SERVICE_NAME: "instant-api"
  ENVIRONMENT: development
  INSTANT_ENABLED_SERVICES: redis,mongodb,postgres,queue,webhook,storage,deploy
  PLANS_PATH: /app/plans.yaml
  NATS_HOST: nats.instant-data.svc.cluster.local
  REDIS_URL: redis://redis.instant.svc.cluster.local:6379
  GEOLITE2_DB_PATH: /app/GeoLite2-City.mmdb
  GITHUB_CLIENT_ID: ""
  GOOGLE_CLIENT_ID: ""
  # Optional default for GET /auth/google/url (agent API) when redirect_uri query is omitted
  GOOGLE_REDIRECT_URI: ""
  PROVISIONER_ADDR: "instant-provisioner.instant-infra.svc.cluster.local:50051"
  COMPUTE_PROVIDER: "k8s"
  STACK_EXPOSE_VIA: "nodeport"
  KUBE_NAMESPACE_APPS: "instant-apps"
  # MINIO_ENDPOINT / MINIO_BUCKET_NAME retired 2026-05-20 (self-hosted MinIO
  # retirement). Object storage now lives behind OBJECT_STORE_* in
  # instant-secrets (DO Spaces, nyc3, bucket instant-shared).
  # Deploy / stack ingress wiring. DEPLOY_DOMAIN is the wildcard zone the
  # api builds per-deploy hostnames under (<id>.deployment.instanode.dev);
  # without it the code falls back to the hardcoded default "instant.dev".
  # CERT_ISSUER names the cert-manager ClusterIssuer used for TLS on those
  # ingresses.
  DEPLOY_DOMAIN: "deployment.instanode.dev"
  CERT_ISSUER: "letsencrypt-http01"
