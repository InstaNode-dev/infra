---
# Platform Postgres — teams, users, resources, pings, onboarding_events
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-platform-pvc
  namespace: instant
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-platform
  namespace: instant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-platform
  template:
    metadata:
      labels:
        app: postgres-platform
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: instant_platform
            - name: POSTGRES_USER
              value: instant
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: PLATFORM_DB_PASSWORD
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "instant", "-d", "instant_platform"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-platform-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-platform
  namespace: instant
spec:
  selector:
    app: postgres-platform
  ports:
    - port: 5432
      targetPort: 5432
