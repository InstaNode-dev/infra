#       app: github-runner
#   policyTypes: [Egress]
#   egress:
#     - to:
#         - ipBlock:
#             cidr: 0.0.0.0/0
#             except:
#               - 10.0.0.0/8        # private RFC1918
#               - 172.16.0.0/12     # private RFC1918
#               - 192.168.0.0/16    # private RFC1918
#               - 100.64.0.0/10     # CGNAT (DOKS pod CIDR variant uses this)
#               - 169.254.0.0/16    # link-local + AWS metadata IMDS
#       ports:
#         - protocol: TCP
#           port: 443
#         - protocol: TCP
#           port: 80
