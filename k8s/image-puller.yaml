apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-puller
  namespace: kube-system
  labels:
    app: image-puller
spec:
  selector:
    matchLabels:
      app: image-puller
  template:
    metadata:
      labels:
        app: image-puller
    spec:
      # Tolerate any taint so the puller lands on every node, including future
      # tainted pools (e.g. spot, gpu) added to the cluster.
      tolerations:
        - operator: Exists
      automountServiceAccountToken: false
      # initContainers run in order, each must succeed before the next. Each
      # one's `:` command exits instantly — the only work is the image pull,
      # which warms the node's containerd image cache. Once the main `pause`
      # container is running and referencing nothing, kubelet GC won't reap
      # these images because they're recent and disk pressure is low.
      initContainers:
        - name: pull-postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          command: ["/bin/true"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
        - name: pull-redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/true"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
        - name: pull-mongo
          image: mongo:7
          imagePullPolicy: IfNotPresent
          command: ["/bin/true"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
        - name: pull-nats
          image: nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/true"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          imagePullPolicy: IfNotPresent
          resources:
            requests: { cpu: 1m,  memory: 8Mi }
            limits:   { cpu: 10m, memory: 16Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
