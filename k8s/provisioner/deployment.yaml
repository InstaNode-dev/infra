---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instant-provisioner
  namespace: instant-infra
  labels:
    app: instant-provisioner
    # instanode.dev/image-pinned — informational. Set to "true" when the
    # running image tag matches v\d+\.\d+\.\d+.* AND has been pinned by
    # .github/workflows/pin-prod-images.yml. See
    # docs/IMAGE-RETENTION-POLICY.md.
    instanode.dev/image-pinned: "true"
  annotations:
    instanode.dev/image-pin-retention-days: "730"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: instant-provisioner
  template:
    metadata:
      labels:
        app: instant-provisioner
    spec:
      # ServiceAccount grants ClusterRole permissions for k8s dedicated backend.
      # When K8S_DEDICATED_BACKEND=false (default), the SA is still present but unused.
      serviceAccountName: instant-provisioner
      # Spread replicas across nodes so node loss doesn't take all gRPC handlers down.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: instant-provisioner
                topologyKey: kubernetes.io/hostname
      # imagePullSecrets — required to pull the prod image from GHCR org
      # `instanode-dev`. Codified 2026-05-20 after a near-miss where a
      # `kubectl apply -f provisioner/deployment.yaml` would have stripped
      # them and left every new pod in ImagePullBackOff. See APPLY-CHECKLIST.md.
      imagePullSecrets:
        - name: ghcr-pull
        - name: ghcr-regrade
      # terminationGracePeriodSeconds — default 30s. Codified so a future
      # bump doesn't silently shrink the budget.
      terminationGracePeriodSeconds: 30
      # NOTE — wait-for-provisioner-db initContainer intentionally absent.
      # Prod runs against DigitalOcean Managed Postgres (the
      # postgres-provisioner Service does not exist in `instant-infra`),
      # and PROVISIONER_DATABASE_URL is the actual source-of-truth env var.
      # For local dev that does run an in-cluster postgres-provisioner pod,
      # use the local-dev overlay alongside this file. See APPLY-CHECKLIST.md.
      containers:
        - name: provisioner
          # Placeholder image — the auto-deploy CI (provisioner repo's
          # .github/workflows/deploy.yml) overrides this via
          # `kubectl set image deploy/instant-provisioner provisioner=ghcr.io/instanode-dev/instant-provisioner:master-<sha>`
          # on every push to master. See APPLY-CHECKLIST.md.
          image: ghcr.io/instanode-dev/instant-provisioner:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            # /healthz sidecar exposed by track 5 (obs-3-provisioner). Used
            # by the Service below for HTTP health probes from Prometheus
            # and Kubernetes-native readiness.
            - containerPort: 8092
              name: healthz
          env:
            # ── Observability (track 6 of 8) ──────────────────────────────────
            # NEW_RELIC_LICENSE_KEY pulled from instant-infra-secrets. When
            # empty or CHANGE_ME, the Go newrelic agent fails open and logs
            # a warning every startup — never crashes.
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: NEW_RELIC_LICENSE_KEY
                  optional: true
            - name: NEW_RELIC_APP_NAME
              value: "instant-provisioner"
            # New Relic OTLP gRPC endpoint (US data center). Use
            # https://otlp.eu01.nr-data.net:4317 for EU accounts.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://otlp.nr-data.net:4317"
            - name: OTEL_SERVICE_NAME
              value: "instant-provisioner"
            # VERSION overrides the -ldflags-baked default at runtime. Bump
            # per release, or leave as "dev" to rely on the buildinfo SHA
            # baked into the image.
            - name: VERSION
              value: "dev"
            - name: PROVISIONER_PORT
              value: "50051"
            # Backend selection — prod runs the k8s backend for postgres +
            # redis (each tenant gets a dedicated pod via the provisioner's
            # k8s.Client). Local dev (Rancher Desktop) overrides these to
            # "local" via a kustomize overlay. Defaulting to "k8s" here so
            # `kubectl apply` doesn't silently downgrade prod's backend
            # selection.
            - name: POSTGRES_PROVISION_BACKEND
              value: "k8s"
            # POSTGRES_CUSTOMERS_URL is the admin URL the provisioner uses
            # to CREATE/DROP customer databases on shared Postgres. The real
            # password lives in instant-infra-secrets — sourcing it here so
            # this manifest never carries the production password.
            - name: POSTGRES_CUSTOMERS_URL
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: POSTGRES_CUSTOMERS_URL
                  optional: true
            - name: REDIS_PROVISION_BACKEND
              value: "k8s"
            - name: REDIS_PROVISION_HOST
              value: "redis-provision.instant-data.svc.cluster.local:6379"
            - name: MONGO_ADMIN_URI
              value: "mongodb://root:root@mongodb.instant-data.svc.cluster.local:27017"
            - name: MONGO_HOST
              value: "mongodb.instant-data.svc.cluster.local:27017"
            - name: PROVISIONER_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: PROVISIONER_SECRET
            # Hot-pool configuration.
            # PROVISIONER_DATABASE_URL is optional: provisioner/main.go logs
            # "provisioner.pool_disabled" and runs without the hot-pool when
            # the value is empty or the key is missing from the secret.
            # Marked optional:true after B2 incident (2026-05-12): `kubectl
            # apply -f infra-secrets.yaml` had dropped a previously-patched
            # key from the in-cluster Secret, leaving new provisioner pods
            # stuck in CreateContainerConfigError. The secret YAML never
            # carried this key, so making the deployment tolerant of its
            # absence is the cleanest fix.
            - name: PROVISIONER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: PROVISIONER_DATABASE_URL
                  optional: true
            - name: AES_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: AES_KEY
            # Hot-pool targets. Raised 2/3/2 -> 10 (and POOL_QUEUE_SIZE added)
            # to fix load-test finding F1 — the provisioning latency cliff.
            # A drained pool now refills CONCURRENTLY (bounded) instead of one
            # item at a time, so a deeper warm buffer no longer costs a
            # proportionally longer serial refill, and 10 ready items absorbs a
            # concurrency-8 burst entirely on the fast pool-claim path instead
            # of falling through to slow live provisioning. Must stay >= the
            # provisioner code default in internal/config/config.go.
            - name: POOL_POSTGRES_SIZE
              value: "10"
            - name: POOL_REDIS_SIZE
              value: "10"
            - name: POOL_MONGO_SIZE
              value: "10"
            - name: POOL_QUEUE_SIZE
              value: "10"
            # ── Kubernetes dedicated backend (Team tier) ──────────────────────
            # See docs/ops-k8s-dedicated.md for the full EKS deployment guide.
            - name: K8S_DEDICATED_BACKEND
              value: "true"
            # K8S_EXTERNAL_HOST is the public-DNS host the provisioner stamps
            # into customer connection URLs that get routed in via TCP-router
            # (pg.instanode.dev → ingress-nginx tcp-services-configmap →
            # tenant Service). For local dev, override to 127.0.0.1 via an
            # overlay (Rancher Desktop NodePorts).
            - name: K8S_EXTERNAL_HOST
              value: "pg.instanode.dev"
            # K8S_STORAGE_CLASS — prod uses DigitalOcean block storage. Local
            # dev (Rancher Desktop) uses "local-path" via an overlay.
            - name: K8S_STORAGE_CLASS
              value: "do-block-storage"
            - name: K8S_POSTGRES_IMAGE
              value: "pgvector/pgvector:pg16"  # includes pgvector so pg_restore can restore vector extension
            - name: K8S_REDIS_IMAGE
              value: "redis:7-alpine"
            - name: K8S_MONGO_IMAGE
              value: "mongo:7"
            - name: K8S_NATS_IMAGE
              value: "nats:2.10-alpine"
            - name: NATS_HOST
              value: "nats.instant-data.svc.cluster.local"
            - name: K8S_POSTGRES_STORAGE_GI
              value: "1"            # small for local dev (saves disk)
            - name: K8S_REDIS_STORAGE_GI
              value: "1"
            - name: K8S_MONGO_STORAGE_GI
              value: "1"
            # ── MinIO storage bytes queries ───────────────────────────────────
            - name: MINIO_ENDPOINT
              value: "minio.instant-data.svc.cluster.local:9000"
            - name: MINIO_BUCKET_NAME
              value: "instant-shared"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_PASSWORD
            # ── OTLP headers (NR license key) — CODIFIED INTENT ───────────────
            # The live deployment has this as an inline `value:` literal (NR
            # license key embedded). Codified intent is to pull from
            # instant-infra-secrets. Until an operator runs the one-time
            # reconciliation (remove the live inline-value entry first), this
            # stays commented out — see APPLY-CHECKLIST.md for the procedure.
            #
            # - name: OTEL_EXPORTER_OTLP_HEADERS
            #   valueFrom:
            #     secretKeyRef:
            #       name: instant-infra-secrets
            #       key: OTEL_EXPORTER_OTLP_HEADERS
            #       optional: true
            # ── Mongo / Queue backend selection (prod uses k8s) ───────────────
            # Defaults flip from `local` to `k8s` in prod via these env vars.
            # Without them the provisioner would treat prod as a local
            # cluster and call pure-Go local backends instead of k8s. The
            # POSTGRES_PROVISION_BACKEND + REDIS_PROVISION_BACKEND defaults
            # ABOVE are still "local"; in prod the auto-deploy or
            # post-apply patch overrides them — codifying the prod intent
            # here so the gap is documented, but the patch from the live
            # source is owned by an operator decision (see APPLY-CHECKLIST.md).
            - name: MONGO_PROVISION_BACKEND
              value: "k8s"
            - name: QUEUE_PROVISION_BACKEND
              value: "k8s"
            # ── Public hostnames for issued connection URLs ───────────────────
            # The provisioner builds the host portion of `connection_url` for
            # customer-facing tokens from these. In local dev they default to
            # 127.0.0.1; in prod they MUST point at the public TCP-router DNS
            # (pg.instanode.dev / redis.instanode.dev / mongo.instanode.dev).
            # Codifying as env defaults so a fresh deploy still issues URLs
            # the customer can reach.
            - name: POSTGRES_PUBLIC_HOST
              value: "pg.instanode.dev"
            - name: POSTGRES_PUBLIC_PORT
              value: "5432"
            - name: REDIS_PUBLIC_HOST
              value: "redis.instanode.dev"
            - name: REDIS_PUBLIC_PORT
              value: "6379"
            - name: K8S_MONGO_PUBLIC_HOST
              value: "mongo.instanode.dev"
            # ── Shared-cluster Redis URL the provisioner injects into routes ──
            - name: REDIS_URL_FOR_ROUTES
              value: "redis://redis.instant.svc.cluster.local:6379"
          # Probes (2026-05-18): the provisioner's /healthz sidecar on port
          # 8092 registers ONLY /healthz — it never serves /livez. All three
          # probes hit /healthz (checks DB + pool init). The generous
          # startupProbe budget (10 min) absorbs hot-pool pre-creation before
          # the liveness probe takes over.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8092
            periodSeconds: 10
            failureThreshold: 60     # 10 min total — covers hot-pool pre-creation
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8092
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz        # provisioner serves only /healthz (no /livez)
              port: 8092
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6      # 6 × 30s = 3 min before SIGKILL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
