---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instant-worker
  namespace: instant-infra
  labels:
    app: instant-worker
    # instanode.dev/image-pinned — informational. Set to "true" when the
    # running image tag matches v\d+\.\d+\.\d+.* AND has been pinned by
    # .github/workflows/pin-prod-images.yml. See
    # docs/IMAGE-RETENTION-POLICY.md.
    instanode.dev/image-pinned: "true"
  annotations:
    instanode.dev/image-pin-retention-days: "730"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: instant-worker
  template:
    metadata:
      labels:
        app: instant-worker
      annotations:
        # Prometheus pod-annotation discovery (P1-W5-08). The worker serves
        # /metrics on port 8091 — the same port as /healthz. These let an
        # annotation-based Prometheus discovery scrape the pod directly; the
        # in-cluster instant-worker Service below is the static_configs path
        # used by infra/prometheus/prometheus.yml.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: instant-worker
      # Multi-worker is safe — River queue uses Postgres SELECT FOR UPDATE
      # SKIP LOCKED so each job lands on exactly one worker.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: instant-worker
                topologyKey: kubernetes.io/hostname
      containers:
        - name: worker
          image: instant-worker:local
          imagePullPolicy: Never
          ports:
            # 8091 serves both /healthz (probes) and /metrics (Prometheus
            # scrape). Named 'metrics' so the instant-worker Service below
            # can reference it by name.
            - containerPort: 8091
              name: metrics
          # Probes (2026-05-18): the worker binary registers ONLY /healthz
          # (plus /metrics) — it never serves /livez. All three probes hit
          # /healthz. /healthz checks River queue connectivity + DB pool
          # (slow on cold start); heavy job replay on restart can stall it
          # briefly, which the generous startupProbe budget absorbs.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8091
            periodSeconds: 10
            failureThreshold: 60     # 10 min total — covers job-replay startup
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz        # worker serves only /healthz (no /livez)
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6      # 6 × 30s = 3 min before SIGKILL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            # ── Observability (track 6 of 8) ──────────────────────────────────
            # NEW_RELIC_LICENSE_KEY pulled from instant-infra-secrets. When
            # empty or CHANGE_ME, the Go newrelic agent fails open and logs
            # a warning every startup — never crashes.
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: NEW_RELIC_LICENSE_KEY
                  optional: true
            - name: NEW_RELIC_APP_NAME
              value: "instant-worker"
            # New Relic OTLP gRPC endpoint (US data center). Use
            # https://otlp.eu01.nr-data.net:4317 for EU accounts.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://otlp.nr-data.net:4317"
            - name: OTEL_SERVICE_NAME
              value: "instant-worker"
            # VERSION overrides the -ldflags-baked default at runtime. Bump
            # per release, or leave as "dev" to rely on the buildinfo SHA
            # baked into the image.
            - name: VERSION
              value: "dev"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis.instant.svc.cluster.local:6379"
            - name: PROVISIONER_ADDR
              value: "instant-provisioner.instant-infra.svc.cluster.local:50051"
            - name: PROVISIONER_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: PROVISIONER_SECRET
            - name: ENVIRONMENT
              value: production
            - name: KUBE_NAMESPACE_APPS
              value: "instant-apps"
            # MinIO storage_bytes scanner — added 2026-05-11 in worker
            # PR #4. The scanner walks every storage resource's bucket
            # once per scan interval, sums object sizes, and updates
            # resources.storage_bytes in the platform Postgres. When
            # MINIO_ENDPOINT is empty (e.g., in CI), the scanner runs
            # as a fail-open no-op and emits a single warn-log line
            # per storage resource per interval.
            - name: MINIO_ENDPOINT
              value: "minio.instant-data.svc.cluster.local:9000"
            - name: MINIO_BUCKET_NAME
              value: "instant-shared"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: MINIO_ROOT_USER
                  optional: true
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: MINIO_ROOT_PASSWORD
                  optional: true
            # Brevo sender identity for the raw-HTML send path (added
            # 2026-05-15). The dashboard-template path was inheriting a
            # personal email from the Brevo sender field — sending these
            # via code-controlled env vars closes that bug. Defaults in
            # brevo_provider.go (noreply@instanode.dev / "instanode")
            # take over if the env var is absent.
            - name: BREVO_SENDER_EMAIL
              value: "noreply@instanode.dev"
            - name: BREVO_SENDER_NAME
              value: "instanode"
---
# Headless ClusterIP Service for the worker (P1-W5-08 / T13-S5-05). The worker
# is a background-job processor with no inbound API traffic, but it serves
# /healthz + /metrics on 8091. This Service exists solely so Prometheus can
# resolve instant-worker.instant-infra.svc.cluster.local:8091 — the target of
# the 'instant-worker' scrape job in infra/prometheus/prometheus.yml, which
# feeds the AnonymousResourceExpiryStopped + StorageIamCreateFailures alerts.
apiVersion: v1
kind: Service
metadata:
  name: instant-worker
  namespace: instant-infra
  labels:
    app: instant-worker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8091"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: instant-worker
  ports:
    - name: metrics
      port: 8091
      targetPort: metrics
      protocol: TCP
