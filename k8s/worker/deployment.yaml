---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instant-worker
  namespace: instant-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instant-worker
  template:
    metadata:
      labels:
        app: instant-worker
    spec:
      serviceAccountName: instant-worker
      containers:
        - name: worker
          image: instant-worker:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8091
              name: liveness
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: ""
            - name: OTEL_SERVICE_NAME
              value: "instant-worker"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis.instant.svc.cluster.local:6379"
            - name: PROVISIONER_ADDR
              value: "instant-provisioner.instant-infra.svc.cluster.local:50051"
            - name: PROVISIONER_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: PROVISIONER_SECRET
            - name: ENVIRONMENT
              value: development
            - name: KUBE_NAMESPACE_APPS
              value: "instant-apps"
            # MinIO storage_bytes scanner — added 2026-05-11 in worker
            # PR #4. The scanner walks every storage resource's bucket
            # once per scan interval, sums object sizes, and updates
            # resources.storage_bytes in the platform Postgres. When
            # MINIO_ENDPOINT is empty (e.g., in CI), the scanner runs
            # as a fail-open no-op and emits a single warn-log line
            # per storage resource per interval.
            - name: MINIO_ENDPOINT
              value: "minio.instant-data.svc.cluster.local:9000"
            - name: MINIO_BUCKET_NAME
              value: "instant-shared"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: MINIO_ROOT_USER
                  optional: true
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: MINIO_ROOT_PASSWORD
                  optional: true
