---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instant-worker
  namespace: instant-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instant-worker
  template:
    metadata:
      labels:
        app: instant-worker
    spec:
      serviceAccountName: instant-worker
      containers:
        - name: worker
          image: instant-worker:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8091
              name: liveness
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: ""
            - name: OTEL_SERVICE_NAME
              value: "instant-worker"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis.instant.svc.cluster.local:6379"
            - name: PROVISIONER_ADDR
              value: "instant-provisioner.instant-infra.svc.cluster.local:50051"
            - name: PROVISIONER_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: PROVISIONER_SECRET
            - name: ENVIRONMENT
              value: development
            - name: KUBE_NAMESPACE_APPS
              value: "instant-apps"
            # Object storage scanner — reads OBJECT_STORE_* env vars from
            # instant-infra-secrets and walks each storage resource's
            # bucket prefix to update resources.storage_bytes in platform
            # Postgres. The legacy MINIO_* env injection was removed when
            # self-hosted MinIO was retired (DO Spaces is now the active
            # backend) — see PR: chore(infra): retire self-hosted MinIO
            # after DO Spaces flip. The scanner falls back to MINIO_* via
            # config.go for local docker-compose dev.
            - name: OBJECT_STORE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_ENDPOINT
                  optional: true
            - name: OBJECT_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_ACCESS_KEY
                  optional: true
            - name: OBJECT_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_SECRET_KEY
                  optional: true
            - name: OBJECT_STORE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_BUCKET
                  optional: true
            - name: OBJECT_STORE_REGION
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_REGION
                  optional: true
            - name: OBJECT_STORE_SECURE
              value: "true"
