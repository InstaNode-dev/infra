---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instant-worker
  namespace: instant-infra
  labels:
    app: instant-worker
    # instanode.dev/image-pinned — informational. Set to "true" when the
    # running image tag matches v\d+\.\d+\.\d+.* AND has been pinned by
    # .github/workflows/pin-prod-images.yml. See
    # docs/IMAGE-RETENTION-POLICY.md.
    instanode.dev/image-pinned: "true"
  annotations:
    instanode.dev/image-pin-retention-days: "730"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: instant-worker
  template:
    metadata:
      labels:
        app: instant-worker
      annotations:
        # Prometheus pod-annotation discovery (P1-W5-08). The worker serves
        # /metrics on port 8091 — the same port as /healthz. These let an
        # annotation-based Prometheus discovery scrape the pod directly; the
        # in-cluster instant-worker Service below is the static_configs path
        # used by infra/prometheus/prometheus.yml.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: instant-worker
      # Multi-worker is safe — River queue uses Postgres SELECT FOR UPDATE
      # SKIP LOCKED so each job lands on exactly one worker.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: instant-worker
                topologyKey: kubernetes.io/hostname
      # imagePullSecrets — required to pull the prod image from GHCR org
      # `instanode-dev`. Codified 2026-05-20 after a near-miss where a
      # `kubectl apply -f worker/deployment.yaml` would have stripped them
      # and left every new pod in ImagePullBackOff. See APPLY-CHECKLIST.md.
      imagePullSecrets:
        - name: ghcr-pull
        - name: ghcr-regrade
      # terminationGracePeriodSeconds — the worker drains in-flight River
      # jobs in Workers.Stop (drain-before-cancel, MR-P0-2/P1-3). 30s is
      # the k8s default; codifying it here so a future kustomize bump
      # doesn't silently shrink the budget.
      terminationGracePeriodSeconds: 30
      # Volumes — the worker reads plans.yaml from disk so it sees the
      # same tier definitions the api does (mounted via instant-plans
      # ConfigMap). Without this mount the worker falls back to
      # defaultYAML in common/plans, which can drift from the api.
      volumes:
        - name: plans
          configMap:
            name: instant-plans
      containers:
        - name: worker
          # Placeholder image — the auto-deploy CI (worker repo's
          # .github/workflows/deploy.yml) overrides this via
          # `kubectl set image deploy/instant-worker worker=ghcr.io/instanode-dev/instant-worker:master-<sha>`
          # on every push to master. See APPLY-CHECKLIST.md.
          image: ghcr.io/instanode-dev/instant-worker:placeholder
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: plans
              mountPath: /app/plans.yaml
              subPath: plans.yaml
          ports:
            # 8091 serves both /healthz (probes) and /metrics (Prometheus
            # scrape). Named 'metrics' so the instant-worker Service below
            # can reference it by name.
            - containerPort: 8091
              name: metrics
          # Probes (refreshed 2026-05-29): worker serves /healthz (shallow:
          # binary + River queue + DB pool ping) AND /readyz (deep upstream
          # matrix — same shape as api/provisioner via common/readiness/,
          # wired READYZ-WIRING-2026-05-20.md). Startup + liveness stay on
          # /healthz (don't fail-over the pod for a slow downstream); only
          # readiness uses /readyz so the worker is taken out of rotation
          # when a critical upstream actually breaks.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8091
            periodSeconds: 10
            failureThreshold: 60     # 10 min total — covers job-replay startup
          readinessProbe:
            httpGet:
              path: /readyz         # deep readiness matrix (critical upstreams → 503)
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz        # shallow — don't restart pod for upstream blips
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6      # 6 × 30s = 3 min before SIGKILL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # envFrom — pull every key in instant-infra-secrets as an env var.
          # The named `env:` block below then overrides specific keys with
          # explicit `valueFrom`/`value` entries when we want to be explicit
          # or set a non-secret default. Marked optional so the worker can
          # boot in a fresh cluster before the secret exists.
          envFrom:
            - secretRef:
                name: instant-infra-secrets
                optional: true
          env:
            # ── Observability (track 6 of 8) ──────────────────────────────────
            # NEW_RELIC_LICENSE_KEY pulled from instant-infra-secrets. When
            # empty or CHANGE_ME, the Go newrelic agent fails open and logs
            # a warning every startup — never crashes.
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: NEW_RELIC_LICENSE_KEY
                  optional: true
            - name: NEW_RELIC_APP_NAME
              value: "instant-worker"
            # New Relic OTLP gRPC endpoint (US data center). Use
            # https://otlp.eu01.nr-data.net:4317 for EU accounts.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://otlp.nr-data.net:4317"
            - name: OTEL_SERVICE_NAME
              value: "instant-worker"
            # VERSION overrides the -ldflags-baked default at runtime. Bump
            # per release, or leave as "dev" to rely on the buildinfo SHA
            # baked into the image.
            - name: VERSION
              value: "dev"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis.instant.svc.cluster.local:6379"
            - name: PROVISIONER_ADDR
              value: "instant-provisioner.instant-infra.svc.cluster.local:50051"
            - name: PROVISIONER_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: PROVISIONER_SECRET
            - name: ENVIRONMENT
              value: production
            - name: KUBE_NAMESPACE_APPS
              value: "instant-apps"
            # Object-storage storage_bytes scanner. The scanner walks every
            # storage resource's bucket once per scan interval, sums object
            # sizes, and updates resources.storage_bytes in the platform
            # Postgres. Backend is selected by OBJECT_STORE_BACKEND (today:
            # do-spaces against nyc3.digitaloceanspaces.com, bucket
            # instant-shared). When OBJECT_STORE_ENDPOINT is empty (e.g., in
            # CI), the scanner runs as a fail-open no-op and emits a single
            # warn-log line per storage resource per interval.
            #
            # Migrated 2026-05-20 from MINIO_* to OBJECT_STORE_* as part of
            # chore/retire-self-hosted-minio-2026-05-20 (supersedes PR #4).
            - name: OBJECT_STORE_BACKEND
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_BACKEND
                  optional: true
            - name: OBJECT_STORE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_ENDPOINT
                  optional: true
            - name: OBJECT_STORE_REGION
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_REGION
                  optional: true
            - name: OBJECT_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_ACCESS_KEY
                  optional: true
            - name: OBJECT_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_SECRET_KEY
                  optional: true
            - name: OBJECT_STORE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_BUCKET
                  optional: true
            - name: OBJECT_STORE_SECURE
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_SECURE
                  optional: true
            # Brevo sender identity for the raw-HTML send path (added
            # 2026-05-15). The dashboard-template path was inheriting a
            # personal email from the Brevo sender field — sending these
            # via code-controlled env vars closes that bug. Defaults in
            # brevo_provider.go (noreply@instanode.dev / "instanode")
            # take over if the env var is absent.
            - name: BREVO_SENDER_EMAIL
              value: "noreply@instanode.dev"
            - name: BREVO_SENDER_NAME
              value: "instanode"
            # ── Worker postgres pool — keep small so River doesn't starve api ─
            - name: WORKER_PG_MAX_OPEN_CONNS
              value: "3"
            - name: WORKER_PG_MAX_IDLE_CONNS
              value: "1"
            # ── Email provider routing ───────────────────────────────────────
            - name: EMAIL_PROVIDER
              value: "brevo"
            # ── Internal API URL for worker→api callbacks ────────────────────
            - name: INSTANT_API_INTERNAL_URL
              value: "http://instant-api.instant.svc.cluster.local:8080"
            # ── Plans file path (mounted from instant-plans ConfigMap) ───────
            - name: PLANS_PATH
              value: "/app/plans.yaml"
            # ── OTLP headers, customer-data URLs — CODIFIED INTENT ────────────
            # The live deployment has these as inline `value:` literals (with
            # embedded passwords/license keys). The codified intent is to
            # pull from instant-infra-secrets. Until an operator runs the
            # one-time reconciliation:
            #
            #   kubectl patch deploy/instant-worker -n instant-infra --type=json \
            #     -p='[{"op":"remove","path":"/spec/template/spec/containers/0/env/<INDEX_OF_EACH>"}]'
            #
            # ...these entries stay commented out — uncommenting them and
            # applying would fail at the API-server validation gate
            # ("valueFrom may not be specified when value is not empty").
            # See APPLY-CHECKLIST.md.
            #
            # - name: OTEL_EXPORTER_OTLP_HEADERS
            #   valueFrom:
            #     secretKeyRef:
            #       name: instant-infra-secrets
            #       key: OTEL_EXPORTER_OTLP_HEADERS
            #       optional: true
            # - name: CUSTOMER_DATABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: instant-infra-secrets
            #       key: CUSTOMER_DATABASE_URL
            #       optional: true
            # - name: CUSTOMER_REDIS_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: instant-infra-secrets
            #       key: CUSTOMER_REDIS_URL
            #       optional: true
            # - name: MONGO_ADMIN_URI
            #   valueFrom:
            #     secretKeyRef:
            #       name: instant-infra-secrets
            #       key: MONGO_ADMIN_URI
            #       optional: true
            # ── Razorpay (worker-side cancellation/reconciliation paths) ─────
            # Worker reads from instant-secrets (instant namespace) — not
            # instant-infra-secrets — because the source of truth for live
            # Razorpay keys is the api's secret. RBAC for cross-namespace
            # secret reads is granted by infra/k8s/worker-rbac.yaml.
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_KEY_ID
                  optional: true
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_KEY_SECRET
                  optional: true
            # ── Object-store backend (storage abstraction, 2026-05-20) ───────
            - name: OBJECT_STORE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_ENDPOINT
                  optional: true
            - name: OBJECT_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_ACCESS_KEY
                  optional: true
            - name: OBJECT_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_SECRET_KEY
                  optional: true
            - name: OBJECT_STORE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_BUCKET
                  optional: true
            - name: OBJECT_STORE_SECURE
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: OBJECT_STORE_SECURE
                  optional: true
---
# Headless ClusterIP Service for the worker (P1-W5-08 / T13-S5-05). The worker
# is a background-job processor with no inbound API traffic, but it serves
# /healthz + /metrics on 8091. This Service exists solely so Prometheus can
# resolve instant-worker.instant-infra.svc.cluster.local:8091 — the target of
# the 'instant-worker' scrape job in infra/prometheus/prometheus.yml, which
# feeds the AnonymousResourceExpiryStopped + StorageIamCreateFailures alerts.
apiVersion: v1
kind: Service
metadata:
  name: instant-worker
  namespace: instant-infra
  labels:
    app: instant-worker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8091"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: instant-worker
  ports:
    - name: metrics
      port: 8091
      targetPort: metrics
      protocol: TCP
