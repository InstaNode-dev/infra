# DO NOT commit real values. This is a template for local dev only.
# Generate secrets: make gen-secrets
# Apply: kubectl apply -f k8s/secrets.yaml
#
# After applying, operators must rotate NEW_RELIC_LICENSE_KEY:
#   kubectl patch secret instant-secrets -n instant --type='json' \
#     -p='[{"op":"replace","path":"/data/NEW_RELIC_LICENSE_KEY","value":"'$(echo -n YOUR_KEY | base64)'"}]'
# Until rotated, services fail-open and log a warning every startup.
apiVersion: v1
kind: Secret
metadata:
  name: instant-secrets
  namespace: instant
type: Opaque
stringData:
  PLATFORM_DB_PASSWORD: instant
  CUSTOMER_DB_PASSWORD: instant_cust
  # New Relic license key — rotate via kubectl patch (see comment at top of file).
  # Empty/CHANGE_ME means the Go agent fails open and logs a warning at startup.
  NEW_RELIC_LICENSE_KEY: "CHANGE_ME"
  # Generate with: openssl rand -hex 32 (must be 32+ chars)
  JWT_SECRET: change_me_32_bytes_minimum_required_here_pad
  # Generate with: openssl rand -hex 32 (must be exactly 64 hex chars)
  AES_KEY: "CHANGE_ME"
  RAZORPAY_KEY_ID: "CHANGE_ME"
  RAZORPAY_KEY_SECRET: "CHANGE_ME"
  RAZORPAY_WEBHOOK_SECRET: "CHANGE_ME"
  RAZORPAY_PLAN_ID_HOBBY: "CHANGE_ME"
  RAZORPAY_PLAN_ID_PRO: "CHANGE_ME"
  RAZORPAY_PLAN_ID_TEAM: "CHANGE_ME"
  RESEND_API_KEY: "CHANGE_ME"
  GITHUB_CLIENT_SECRET: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"
  R2_API_TOKEN: "CHANGE_ME"
  R2_ENDPOINT: "CHANGE_ME"
  R2_BUCKET_NAME: "CHANGE_ME"
  # MinIO credentials (same values as in infra/k8s/data/minio-secret.yaml)
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minioadmin123"
  # Comma-separated list of admin user emails (case-insensitive). Empty
  # / unset → admin endpoints reject every caller (closed-by-default).
  # Read by api/internal/middleware/admin.go on every request, no app
  # cache, so a `kubectl patch ... ADMIN_EMAILS` + pod restart is the
  # full propagation cycle.
  ADMIN_EMAILS: "CHANGE_ME_comma_separated_admin_emails"
  # Operator: generate via `openssl rand -hex 32` (yields 64 lowercase
  # hex chars; minimum length is 32, alphanumeric only). NEVER commit a
  # real value. Empty/unset is also a valid configuration — it disables
  # the admin endpoints entirely (closed-by-default). Documented in
  # api/INTERNAL-OPS.md (private). See feat/admin-path-prefix-fresh.
  #
  # SECURITY: this value is a credential with the same blast radius as
  # a session token. It's delivered to admin clients via /auth/me's
  # admin_path_prefix field and used to build /api/v1/<prefix>/customers
  # URLs. Treat it like JWT_SECRET — never log, never echo into UI text,
  # never paste into a third-party tool. Rotate on any suspected leak:
  #   new=$(openssl rand -hex 32)
  #   kubectl patch secret instant-secrets -n instant --type merge \
  #     -p "{\"data\":{\"ADMIN_PATH_PREFIX\":\"$(printf '%s' $new | base64)\"}}"
  #   kubectl rollout restart deploy/instant-api -n instant
  ADMIN_PATH_PREFIX: "CHANGE_ME_64char_random_alphanumeric"
