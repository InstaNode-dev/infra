# DO NOT commit real values. This is a template for local dev only.
# Generate secrets: make gen-secrets
# Apply: kubectl apply -f k8s/secrets.yaml
#
# After applying, operators must rotate NEW_RELIC_LICENSE_KEY:
#   kubectl patch secret instant-secrets -n instant --type='json' \
#     -p='[{"op":"replace","path":"/data/NEW_RELIC_LICENSE_KEY","value":"'$(echo -n YOUR_KEY | base64)'"}]'
# Until rotated, services fail-open and log a warning every startup.
apiVersion: v1
kind: Secret
metadata:
  name: instant-secrets
  namespace: instant
type: Opaque
stringData:
  PLATFORM_DB_PASSWORD: CHANGE_ME
  CUSTOMER_DB_PASSWORD: CHANGE_ME
  # New Relic license key — rotate via kubectl patch (see comment at top of file).
  # Empty/CHANGE_ME means the Go agent fails open and logs a warning at startup.
  NEW_RELIC_LICENSE_KEY: "CHANGE_ME"
  # Generate with: openssl rand -hex 32 (must be 32+ chars)
  JWT_SECRET: change_me_32_bytes_minimum_required_here_pad
  # Generate with: openssl rand -hex 32 (must be exactly 64 hex chars)
  AES_KEY: "CHANGE_ME"
  RAZORPAY_KEY_ID: "CHANGE_ME"
  RAZORPAY_KEY_SECRET: "CHANGE_ME"
  RAZORPAY_WEBHOOK_SECRET: "CHANGE_ME"
  RAZORPAY_PLAN_ID_HOBBY: "CHANGE_ME"
  RAZORPAY_PLAN_ID_PRO: "CHANGE_ME"
  RAZORPAY_PLAN_ID_TEAM: "CHANGE_ME"
  RESEND_API_KEY: "CHANGE_ME"
  GITHUB_CLIENT_SECRET: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"
  R2_API_TOKEN: "CHANGE_ME"
  R2_ENDPOINT: "CHANGE_ME"
  R2_BUCKET_NAME: "CHANGE_ME"
  # MinIO credentials (same values as in infra/k8s/data/minio-secret.yaml)
  MINIO_ROOT_USER: "CHANGE_ME"
  MINIO_ROOT_PASSWORD: "CHANGE_ME"
