---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instant-api
  namespace: instant
  labels:
    app: instant-api
    # instanode.dev/image-pinned — informational label that flips to "true"
    # once this Deployment's image tag matches the production regex
    # v\d+\.\d+\.\d+.* AND the pin-prod-images workflow has run for it.
    # Audit: `kubectl get deploy -A -l instanode.dev/image-pinned=true`.
    # See docs/IMAGE-RETENTION-POLICY.md for the policy + recovery flow.
    instanode.dev/image-pinned: "true"
  annotations:
    # Retention window declared at the Deployment level so operators can
    # see the policy without leaving kubectl. The actual retention is
    # enforced by .github/workflows/pin-prod-images.yml + the absence of
    # any delete-old-versions workflow that targets prod tags.
    instanode.dev/image-pin-retention-days: "730"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: instant-api
  template:
    metadata:
      labels:
        app: instant-api
    spec:
      serviceAccountName: instant-api   # grants deploy-manager ClusterRole (see deploy-rbac.yaml)
      # terminationGracePeriodSeconds — 35s after SIGTERM before kubelet
      # escalates to SIGKILL. Budget (matches runServerWithGracefulShutdown
      # in api/main.go):
      #   preStop sleep             5s  ← LB sees /readyz 503 first
      #   readinessDrainGrace       3s  ← in-process probe-tick window
      #   gracefulShutdownTimeout  25s  ← Fiber drain in-flight handlers
      #   safety margin             2s  ← buffer before SIGKILL
      #   ──                       ────
      #   total                    35s
      # Default is 30s, which collides with our 25+3+5=33s drain.
      # MR-P0-7 (BugBash 2026-05-20). Keep in sync with main.go consts.
      terminationGracePeriodSeconds: 35
      # Spread replicas across nodes when possible — preferred (not required)
      # so a 1-node dev cluster still schedules both pods.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: instant-api
                topologyKey: kubernetes.io/hostname
      # imagePullSecrets — required to pull the prod image from GHCR org
      # `instanode-dev`. Removing either of these will leave new pods stuck
      # in ImagePullBackOff after the next rollout. The auto-deploy CI sets
      # the image tag via `kubectl set image` but does NOT (and cannot)
      # repair imagePullSecrets if they get stripped by a naive
      # `kubectl apply -f app.yaml` — see APPLY-CHECKLIST.md.
      imagePullSecrets:
        - name: ghcr-pull
        - name: ghcr-org-pull
      # NOTE — wait-for-platform-db initContainer intentionally absent.
      # Prod runs against DigitalOcean Managed Postgres (no in-cluster
      # `postgres-platform` Service); the init container would block
      # pod startup forever. For local dev (Rancher Desktop / k3s with
      # an in-cluster postgres-platform Service), use the
      # `local-dev-overlay.yaml` overlay alongside this file. See
      # APPLY-CHECKLIST.md.
      containers:
        - name: api
          # Placeholder image — the auto-deploy CI (api repo's
          # .github/workflows/deploy.yml) overrides this via
          # `kubectl set image deploy/instant-api api=ghcr.io/instanode-dev/instant-api:master-<sha>`
          # on every push to master. The value below is a fallback that
          # documents intent + lets `kubectl apply --dry-run` succeed; the
          # tag `placeholder` will fail to pull if a literal apply ever
          # reaches the cluster, which is the LOUD failure we want over
          # a SILENT regression to `instant-api:local`. Per CLAUDE.md
          # rule 15, this repo has no auto-apply by design.
          image: ghcr.io/instanode-dev/instant-api:placeholder   # see APPLY-CHECKLIST.md
          # preStop — sleep 5s before SIGTERM is delivered so the kubelet
          # has a tick to observe the readinessProbe failure (the api
          # flips inside runServerWithGracefulShutdown via
          # hooks.Readyz.MarkDraining) and update Service endpoints.
          # Without this, the LB keeps routing new traffic to a pod that
          # is about to stop accepting connections. MR-P0-7.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: instant-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: DATABASE_URL
            - name: CUSTOMER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: CUSTOMER_DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: JWT_SECRET
            - name: AES_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: AES_KEY
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_KEY_ID
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_KEY_SECRET
            - name: RAZORPAY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_WEBHOOK_SECRET
            # BREVO_WEBHOOK_SECRET — URL-token for the transactional-
            # delivery receiver at POST /webhooks/brevo/:secret +
            # HMAC key for the legacy /api/v1/email/webhook/brevo path.
            # See api/internal/handlers/brevo_webhook.go for the full
            # rationale ("201 ≠ delivered" gap closure).
            - name: BREVO_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: BREVO_WEBHOOK_SECRET
                  optional: true
            - name: RAZORPAY_PLAN_ID_HOBBY
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_PLAN_ID_HOBBY
            - name: RAZORPAY_PLAN_ID_PRO
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_PLAN_ID_PRO
            - name: RAZORPAY_PLAN_ID_TEAM
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_PLAN_ID_TEAM
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RESEND_API_KEY
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: PROVISIONER_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: PROVISIONER_SECRET
            - name: R2_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: R2_API_TOKEN
            - name: R2_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: R2_ENDPOINT
                  optional: true
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: R2_BUCKET_NAME
                  optional: true
            # MINIO_ROOT_USER/MINIO_ROOT_PASSWORD env refs retired 2026-05-20
            # (chore/retire-self-hosted-minio-2026-05-20). The api reads
            # OBJECT_STORE_* below for the canonical DO Spaces backend.
            # ── Razorpay annual plan IDs (codified 2026-05-20) ────────────────
            # Live since the annual-pricing toggle shipped. Required for any
            # *_yearly plan checkout to succeed. NOT optional in prod, but
            # marked so to let the api boot in a fresh cluster before secrets
            # are populated.
            - name: RAZORPAY_PLAN_ID_HOBBY_YEARLY
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_PLAN_ID_HOBBY_YEARLY
                  optional: true
            - name: RAZORPAY_PLAN_ID_PRO_YEARLY
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: RAZORPAY_PLAN_ID_PRO_YEARLY
                  optional: true
            # ── Deploy backend (the /deploy/new wedge) ────────────────────────
            # BUILD_IMAGE_REGISTRY is where Kaniko pushes the built customer
            # image; DEPLOY_DOMAIN is the apex DNS for *.deployment.<>;
            # CERT_ISSUER is the cert-manager ClusterIssuer that mints TLS
            # certs for each deployed app's ingress.
            - name: BUILD_IMAGE_REGISTRY
              value: "ghcr.io/REDACTED/instant-userapp"
            - name: DEPLOY_DOMAIN
              value: "deployment.instanode.dev"
            - name: CERT_ISSUER
              value: "letsencrypt-http01"
            # E2E_TEST_TOKEN — used by the e2e/staging contract tests
            # (`/api/v1/admin/e2e/*` routes) to bypass anonymous quotas. Marked
            # optional so a missing key doesn't keep the api from booting in a
            # fresh cluster.
            - name: E2E_TEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: E2E_TEST_TOKEN
                  optional: true
            # ── OAuth client IDs (PUBLIC — id, not the secret) ───────────────
            # The GITHUB_CLIENT_SECRET / GOOGLE_CLIENT_SECRET above are the
            # private halves; these are the public client IDs the frontend
            # uses to construct the OAuth-redirect URL.
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            # ── Object-store backend (storage abstraction, 2026-05-20) ────────
            # OBJECT_STORE_BACKEND selects the impl: do-spaces (prod today),
            # r2, or s3. The rest are backend-specific. See
            # common/storageprovider/factory.go. The self-hosted MinIO backend
            # was retired 2026-05-20 — DO Spaces (`nyc3.digitaloceanspaces.com`,
            # bucket `instant-shared`) is the canonical production backend.
            - name: OBJECT_STORE_BACKEND
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: OBJECT_STORE_BACKEND
                  optional: true
            - name: OBJECT_STORE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: OBJECT_STORE_ENDPOINT
                  optional: true
            - name: OBJECT_STORE_REGION
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: OBJECT_STORE_REGION
                  optional: true
            - name: OBJECT_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: OBJECT_STORE_ACCESS_KEY
                  optional: true
            - name: OBJECT_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: OBJECT_STORE_SECRET_KEY
                  optional: true
            - name: OBJECT_STORE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: OBJECT_STORE_BUCKET
                  optional: true
            - name: OBJECT_STORE_SECURE
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: OBJECT_STORE_SECURE
                  optional: true
            - name: OBJECT_STORE_PUBLIC_URL
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: OBJECT_STORE_PUBLIC_URL
                  optional: true
            # ── Platform admin gates ─────────────────────────────────────────
            # Two independent gates protect /api/v1/<prefix>/customers/...:
            #
            #   1. ADMIN_EMAILS — comma-separated, case-insensitive allowlist.
            #      Closed-by-default: empty/unset rejects every caller.
            #      Read on every request, no app cache.
            #   2. ADMIN_PATH_PREFIX — unguessable URL segment (32+ chars,
            #      alphanumeric). Empty/unset → admin routes NOT registered
            #      (404 platform-wide). < 32 chars or non-alphanumeric → app
            #      refuses to start. Generate via `openssl rand -hex 32`.
            #
            # Both are marked `optional: true` so the api starts during
            # initial cluster bootstrap (before secrets exist) — admin
            # endpoints simply stay disabled until both vars are populated.
            # See api/INTERNAL-OPS.md (private) for rotation procedure.
            - name: ADMIN_EMAILS
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: ADMIN_EMAILS
                  optional: true
            - name: ADMIN_PATH_PREFIX
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: ADMIN_PATH_PREFIX
                  optional: true
            # ── Observability (track 6 of 8) ──────────────────────────────────
            # NEW_RELIC_LICENSE_KEY pulled from instant-secrets. When empty or
            # set to CHANGE_ME, the Go newrelic agent fails open and logs a
            # warning every startup — never crashes.
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-secrets
                  key: NEW_RELIC_LICENSE_KEY
                  optional: true
            - name: NEW_RELIC_APP_NAME
              value: "instant-api"
            # New Relic OTLP gRPC endpoint (US data center). Use
            # https://otlp.eu01.nr-data.net:4317 for EU accounts.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://otlp.nr-data.net:4317"
            # OTEL_EXPORTER_OTLP_HEADERS — the `api-key=<NR-license-key>` pair
            # the OTLP exporter sends to New Relic. Patched into the live
            # deployment on 2026-05-12 (B3 incident) so distributed tracing
            # works.
            #
            # CODIFIED INTENT: pull from secret (never commit the literal
            # license key). LIVE STATE: hardcoded as an inline `value:`
            # (history from the original kubectl patch).
            #
            # Reconciling these two requires the live deployment to FIRST be
            # patched to remove its inline value (so the strategic-merge
            # apply doesn't try to set both `value` and `valueFrom`):
            #
            #   kubectl get secret instant-secrets -n instant -o json \
            #     | jq -r '.data.OTEL_EXPORTER_OTLP_HEADERS' \
            #     | base64 -d  # confirm secret holds the right value first
            #   kubectl patch deploy/instant-api -n instant --type=json \
            #     -p='[{"op":"remove","path":"/spec/template/spec/containers/0/env/<INDEX>"}]'
            #   # then `kubectl apply -f app.yaml` will re-add via secretKeyRef
            #
            # Until that one-time reconciliation runs, this entry stays
            # COMMENTED OUT — the dry-run conflict it produces is real and
            # documents this remaining drift. See APPLY-CHECKLIST.md.
            #
            # - name: OTEL_EXPORTER_OTLP_HEADERS
            #   valueFrom:
            #     secretKeyRef:
            #       name: instant-secrets
            #       key: OTEL_EXPORTER_OTLP_HEADERS
            #       optional: true
            # VERSION is read by buildinfo at runtime (overrides the -ldflags
            # value baked at build time). Operators bump this per release;
            # alternatively, leave empty and rely on the image tag baked in
            # via -ldflags -X instant.dev/common/buildinfo.Version=$VERSION
            # in the Dockerfile (see obs track 1/4).
            - name: VERSION
              value: "dev"
          # Probe split (2026-05-13): /healthz checks DB connectivity +
          # migration completion (slow on cold start); /livez is process-only
          # ("alive, may not be ready"). Without the split, livenessProbe
          # fires before migrations finish and k8s SIGKILLs a healthy pod
          # mid-migration. See PR body for the api repo follow-up adding
          # GET /livez. Until that handler ships, /livez 404s and liveness
          # will fail open via failureThreshold=6 (≈3 min of grace).
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            failureThreshold: 60     # 10 min total — covers migration-heavy boots
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez          # process-only check; see startupProbe note
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6      # 6 × 30s = 3 min before SIGKILL
          # Resource requests/limits — the api is build-heavy (it shells out
          # to Kaniko Job orchestration on /deploy/new), so it gets headroom.
          # The requests are also what the HPA needs to compute utilization;
          # without them the HPA fires FailedGetResourceMetric and never
          # scales (P1-W5-15).
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: instant-api
  namespace: instant
spec:
  # Externally reached via the cluster's Ingress (ingress-nginx) — see
  # infra/k8s/api-ingress.yaml. The Service stays ClusterIP so the only
  # public entrypoint is the LB → Ingress → Service path.
  # For local dev / E2E: kubectl port-forward svc/instant-api 8080:8080
  # (NodePort retired 2026-05-11).
  type: ClusterIP
  selector:
    app: instant-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
