---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instant-migrator
  namespace: instant-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instant-migrator
  template:
    metadata:
      labels:
        app: instant-migrator
    spec:
      containers:
        - name: migrator
          image: instant-migrator:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          env:
            - name: HTTP_PORT
              value: "8090"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: DATABASE_URL
            - name: PROVISIONER_ADDR
              value: "instant-provisioner.instant-infra.svc.cluster.local:50051"
            - name: PROVISIONER_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: PROVISIONER_SECRET
            - name: MIGRATOR_SECRET
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: MIGRATOR_SECRET
            - name: AES_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: AES_KEY
            # ── Workflow engine ──────────────────────────────────────────
            # Set WORKFLOW_ENGINE=temporal to enable durable Temporal workflows.
            # Set WORKFLOW_ENGINE=local (default) for goroutine-pool runner.
            # Switch live: kubectl set env deployment/instant-migrator -n instant-infra WORKFLOW_ENGINE=temporal
            - name: WORKFLOW_ENGINE
              value: "temporal"
            - name: TEMPORAL_HOST
              value: "temporal-frontend.temporal.svc.cluster.local:7233"
            - name: TEMPORAL_NAMESPACE
              value: "default"
            # TEMPORAL_API_KEY: only needed for Temporal Cloud (not local k8s)
            - name: TEMPORAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-infra-secrets
                  key: TEMPORAL_API_KEY
                  optional: true
          # Probe split (2026-05-13): /health checks Temporal + DB connectivity
          # (slow on cold start); /livez is process-only. Migrator is the most
          # at-risk service for the migration-mid-flight kill scenario because
          # it literally orchestrates long-running workflow migrations.
          # See PR body for the migrator follow-up adding GET /livez.
          # Until that handler ships, /livez 404s and liveness falls back to
          # failureThreshold=6 grace (≈3 min).
          startupProbe:
            httpGet:
              path: /health
              port: 8090
            periodSeconds: 10
            failureThreshold: 60     # 10 min total — covers Temporal connect + DB warm-up
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez          # process-only; see startupProbe note
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6      # 6 × 30s = 3 min before SIGKILL
